name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, final-branch ]
  pull_request:
    branches: [ main, master, final-branch ]

jobs:
  # Backend Build & Test
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore VTCLBD.slnx

      - name: Build Solution
        run: dotnet build VTCLBD.slnx --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test VTCLBD.slnx --configuration Release --no-build --verbosity normal

  # Frontend Build & Lint
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd client
          npm install

      - name: Lint Code
        run: |
          cd client
          npm run lint || echo "Lint issues ignored for CI build validation"

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5237/api"
        run: |
          cd client
          npm run build

  # Docker Validation
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: vtclbd-backend:latest

      - name: Build Frontend Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: vtclbd-frontend:latest
